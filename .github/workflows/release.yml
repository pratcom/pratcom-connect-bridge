name: Build premium & attach plugin zip (canal GitHub/PUC)

# A chaque release publiee sur GitHub, construit un .zip complet du plugin
# (avec le dossier vendor/ resolu par Composer) et le joint a la release.
# C'est ce .zip que le Plugin Update Checker telecharge (enableReleaseAssets).
# Sans cet asset, WordPress installe un paquet incomplet -> erreur fatale.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifier header et constante == tag (lecon 5)
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          HEADER=$(grep -oP '^\s\*\s*Version:\s*\K\S+' pratcom-connect-bridge.php)
          CONST=$(grep -oP "define\('PRATCOM_CONNECT_BRIDGE_VERSION',\s*'\K[^']+" pratcom-connect-bridge.php)
          echo "tag=$TAG header=$HEADER constante=$CONST"
          if [ "$TAG" != "$HEADER" ] || [ "$TAG" != "$CONST" ]; then
            echo "::error::Incoherence version : tag=$TAG header=$HEADER constante=$CONST (lecon 5 - jamais de release incoherente)"
            exit 1
          fi

      - name: Setup PHP 8.1 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install production dependencies (with vendor/)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Assemble plugin folder
        run: |
          mkdir -p build/pratcom-connect-bridge
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='composer.lock' \
            ./ build/pratcom-connect-bridge/

      - name: Create zip
        run: |
          cd build
          zip -r pratcom-connect-bridge.zip pratcom-connect-bridge

      - name: Attach zip to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/pratcom-connect-bridge.zip
